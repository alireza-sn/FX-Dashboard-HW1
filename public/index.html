<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXpal - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- iCloud Style Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-card glass">
            <h1>FXpal Login</h1>
            <p>Login to My FX Dashboard</p>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" placeholder="Enter Email" required value="A.saeidinejad@fx.dashboard">
                    <input type="password" placeholder="Enter Password" required value="Password123">
                </div>
                <button type="submit" class="pill-button">Sign In</button>
            </form>
        </div>
        <footer class="login-footer">
            <p>FX Privacy &nbsp; | &nbsp; Developed by Alireza | FXpal</p>
        </footer>
    </div>

    <!-- Responsive Dashboard Layout -->
    <div id="dashboard" class="dashboard-layout" style="display: none;">
        <div class="sidebar-wrapper">
            <!-- Sidebar (Desktop) / Bottom Nav (Mobile) -->
            <aside id="sidebar" class="sidebar glass-dark">
                <div class="sidebar-header">
                    <div class="logo">FX<span>pal</span></div>
                    <button id="sidebar-toggle" class="toggle-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
                <nav id="sidebar-nav">
                    <a href="#" class="active" data-tab="overview">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        <span>Overview</span>
                    </a>
                    <a href="#" data-tab="clients">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span>Clients</span>
                    </a>
                    <a href="#" data-tab="finances">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <span>Finances</span>
                    </a>
                    <a href="#" data-tab="alerts">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span>Alerts</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout-btn" class="minimal-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        <span>Log Out</span>
                    </button>
                </div>
            </aside>
        </div>

        <main class="main-content">
            <header class="glass">
                <div class="header-left">
                    <div class="search-bar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Search Terminals">
                    </div>
                </div>
                <div class="header-right">
                    <button id="theme-toggle" class="theme-btn">🌓</button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name">Alireza</span>
                            <span class="user-role" id="display-role">FX Agent</span>
                        </div>
                        <div class="avatar">A</div>
                    </div>
                </div>
            </header>

            <div id="dynamic-content" class="content-body">
                <!-- Content injected by script.js -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
